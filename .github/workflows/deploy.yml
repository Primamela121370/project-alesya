name: Deploy Olesiapro

on:
  push:
    branches:
      - main
      - test

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set deploy path
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "path=/var/www/olesiapro.ru" >> $GITHUB_OUTPUT
          else
            echo "path=/var/www/test.olesiapro.ru" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='.env'
          path: ./
          remote_path: ${{ steps.vars.outputs.path }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}

      - name: Reload PHP-FPM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: sudo systemctl reload php8.3-fpm
