name: Deploy Olesiapro

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - production
      source_ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: true
        default: "main"
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - name: Set deploy path
        id: vars
        run: |
          if [ "${{ inputs.target }}" = "production" ]; then
            echo "path=/var/www/olesiapro.ru" >> $GITHUB_OUTPUT
          else
            echo "path=/var/www/test.olesiapro.ru" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='.env'
          path: ./
          remote_path: ${{ steps.vars.outputs.path }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}

      - name: Reload PHP-FPM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: sudo systemctl reload php8.3-fpm
